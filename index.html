<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Index Terminal</title>
    <style>
        body {
            background-color: #030303;
            color: #d1f7ff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
            text-shadow: 0 0 8px rgba(209, 247, 255, 0.6);
        }
        #container {
            text-align: center;
            max-width: 700px;
            padding: 20px;
        }
        #prescript-text {
            font-size: 1.6rem;
            line-height: 1.5;
            letter-spacing: 1px;
            min-height: 120px;
            white-space: pre-wrap;
        }
        .flicker { 
            animation: flicker-anim 0.15s infinite; 
        }
        @keyframes flicker-anim { 
            0% { opacity: 0.75; } 
            50% { opacity: 1; } 
            100% { opacity: 0.8; } 
        }
    </style>
</head>
<body>

<div id="container">
    <div id="prescript-text">【 CLICK TO RECEIVE PRESCRIPT 】</div>
</div>

<script>
    const instructions = [
        "Get on Limbus and larp.",
    ];

    const display = document.getElementById('prescript-text');
    let isTyping = false;

    document.body.addEventListener('click', () => {
        if (isTyping) return;
        
        isTyping = true;
        display.classList.add('flicker');
        
        let selectedText = instructions[Math.floor(Math.random() * instructions.length)];
        let fullMessage = `【 ${selectedText} 】`;
        
        display.textContent = ""; 
        let i = 0;
        
        const type = () => {
            if (i < fullMessage.length) {
                display.textContent += fullMessage[i]; 
                i++;
                setTimeout(type, 40);
            } else {
                display.classList.remove('flicker');
                isTyping = false;
            }
        };
        type();
    });
</script>
</body>
</html>
